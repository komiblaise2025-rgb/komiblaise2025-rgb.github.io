<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technologies et Innovations | Performance & Tech</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #1a1a1a; --header-bg: #000000; --accent: #0070f3; }
        body.dark-mode { --bg-color: #121212; --text-color: #ffffff; --header-bg: #000000; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; line-height: 1.6; margin: 0; transition: 0.3s; }
        header { background: var(--header-bg); color: #fff; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        nav { background: #111; padding: 12px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 15px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; }
        #theme-toggle { background: var(--accent); color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 20px; }
        main { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .ad-spot { background: #f9f9f9; border: 1px solid #ddd; margin: 20px 0; padding: 15px; text-align: center; min-height: 100px; color: #888; }
        .post-card { border-left: 5px solid var(--accent); padding: 20px; background: #fdfdfd; margin-bottom: 30px; }
        body.dark-mode .post-card { background: #1e1e1e; }
        footer { background: #000; color: #fff; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>
<header><h1>Technologies et Innovations</h1><p>Le futur du web et de la performance.</p></header>
<nav><a href="index.html">Accueil</a><button id="theme-toggle"> Mode Sombre</button></nav>
<main>
    <div class="ad-spot">Espace Publicitaire</div>
    <section>
        <div class="post-card">
            <h2>Best Free AI Tools in 2026</h2>
            <p>Découvrez les outils d'intelligence artificielle les plus puissants pour booster votre productivité.</p>
        </div>
    </section>
    <div class="ad-spot">Espace Publicitaire</div>
</main>
<footer><p>Technologies et Innovations &copy; 2026</p></footer>

<script>
    const btn = document.getElementById("theme-toggle");
    if (localStorage.getItem("theme") === "dark") { document.body.classList.add("dark-mode"); btn.textContent = " Mode Clair"; }
    btn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        const isDark = document.body.classList.contains("dark-mode");
        btn.textContent = isDark ? " Mode Clair" : " Mode Sombre";
        localStorage.setItem("theme", isDark ? "dark" : "light");
    });
</script>

</body>
</html>
